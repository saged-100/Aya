<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مؤسسة آية - النسخة السحابية المكتملة</title>
  
  <!-- تحميل Tailwind CSS للمظهر الاحترافي المتناسق مع الهواتف والكمبيوتر -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- تحميل أيقونات Tabler الممتازة -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght=400;500;700&display=swap');
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #0f0f11;
      color: #E2E8F0;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: #141416;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #10B981;
      border-radius: 10px;
    }
    /* تأثيرات حركية ناعمة للاستجابة السريعة */
    .fade-enter {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .fade-enter-active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between pb-24 md:pb-0 custom-scroll relative">

  <!-- شاشة التحميل السحابية الممتازة -->
  <div id="global-loader" class="fixed inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center gap-4 transition-opacity duration-500">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 border-4 border-emerald-500/20 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-t-emerald-500 rounded-full animate-spin"></div>
      <div class="absolute inset-0 flex items-center justify-center text-emerald-500">
        <i class="ti ti-database-share text-3xl animate-pulse"></i>
      </div>
    </div>
    <div class="text-center">
      <h3 class="text-lg font-bold text-white">جاري الاتصال السحابي الآمن</h3>
      <p class="text-xs text-gray-400 mt-1">جلب ومزامنة قواعد بيانات مؤسسة آية من Google Sheets...</p>
    </div>
  </div>

  <!-- حاوية التنبيهات المنبثقة الطائرة (Toasts) -->
  <div id="toast-container" class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-[300] flex flex-col gap-2 w-full max-w-xs px-4 pointer-events-none"></div>

  <div class="w-full max-w-md md:max-w-2xl min-h-screen flex flex-col justify-between bg-[#141416] shadow-2xl relative border-x border-gray-800/40">
    
    <!-- ===================== شاشة تسجيل الدخول ===================== -->
    <div id="screen-login" class="flex-1 flex flex-col justify-center items-center px-6 py-12">
      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/20 shadow-lg shadow-emerald-500/5">
          <i class="ti ti-school text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-wide">مؤسسة آية</h1>
        <p class="text-xs text-emerald-500/80 font-medium mt-1">بوابة الإشراف والمتابعة الأكاديمية والمدرسية</p>
      </div>

      <div class="w-full bg-[#1b1b1f] border border-gray-800/80 rounded-3xl p-6 flex flex-col gap-4 shadow-xl">
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-2">اسم المستخدم</label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-500">
              <i class="ti ti-user text-base"></i>
            </span>
            <input type="text" id="inp-user" class="w-full bg-[#232329] border border-gray-800 rounded-2xl pr-10 pl-4 py-3.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="sago">
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-2">كلمة السر</label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-500">
              <i class="ti ti-lock text-base"></i>
            </span>
            <input type="password" id="inp-pass" class="w-full bg-[#232329] border border-gray-800 rounded-2xl pr-10 pl-4 py-3.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="••••••••">
          </div>
        </div>

        <div id="login-error" class="text-xs text-red-500 text-center font-medium hidden">
          اسم المستخدم أو كلمة السر غير صحيحة! يرجى التحقق وإعادة المحاولة.
        </div>

        <button onclick="handleLogin()" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] text-white font-bold py-4 rounded-2xl text-sm transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/10 mt-2">
          <span>تسجيل دخول سحابي</span>
          <i class="ti ti-arrow-left text-lg"></i>
        </button>
      </div>
    </div>

    <!-- ===================== شاشة التطبيق الداخلية ===================== -->
    <div id="screen-main" class="hidden flex-1 flex flex-col">
      
      <!-- الهيدر العلوي الذكي المتناسق مع الهوية المظلمة -->
      <div class="bg-[#1b1b1f] border-b border-gray-800/60 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
          <div id="user-avatar" class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-500 flex items-center justify-center font-bold border border-emerald-500/20 shadow-md">
            م
          </div>
          <div>
            <div id="user-display-name" class="text-sm font-bold text-white">تحميل...</div>
            <div id="user-display-role" class="text-[10px] text-gray-400 flex items-center gap-1 mt-0.5">
              <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              <span id="role-text">IT Manager</span>
            </div>
          </div>
        </div>
        
        <button onclick="confirmLogout()" class="w-10 h-10 rounded-xl bg-red-950/20 text-red-400 hover:bg-red-950/40 active:scale-95 flex items-center justify-center transition-all border border-red-900/30">
          <i class="ti ti-logout text-lg"></i>
        </button>
      </div>

      <!-- محتوى الصفحات الديناميكي -->
      <div id="main-content" class="flex-1 p-4 flex flex-col gap-4 overflow-y-auto max-h-[calc(100vh-140px)] custom-scroll">
        <!-- يتم رندرة الصفحات هنا بناءً على دور المستخدم والتبويب النشط -->
      </div>

      <!-- شريط التنقل السفلي الفخم المتطابق مع صلاحيات الأدوار المعتمدة -->
      <div id="bottom-navbar" class="bg-[#1b1b1f] border-t border-gray-800/60 flex justify-around py-2 sticky bottom-0 z-50">
        <!-- يمتلئ ديناميكياً حسب صلاحية المستخدم -->
      </div>
    </div>

  </div>

  <div id="modal-container" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[150] p-4">
    <!-- محتوى المودال يظهر هنا ديناميكياً -->
  </div>

  <!-- ===================== محرك الجافا سكريبت والمحاكاة الذكية المترابطة سحابياً ===================== -->
  <script>
    // الرابط السحابي الخاص بالـ Web App المنشور من شيت جوجل لربط مؤسسة آية
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwiRsFNS9sHxBw6LaLgv1PjvMgQLArmxLwBGiJ6c7QQxpnfFD0JwhOQkuyE0S1a1rj7/exec"; 

    // قاعدة بيانات المحاكاة الذكية والاحتياطية مع مسميات الأدوار الإنجليزية الجديدة للمؤسسة
    const DB_EMULATOR = {
      settings: {
        price: 400,
        examMax: 50,
        subjects: ['نحو', 'نصوص', 'أدب']
      },
      users: [
        {name: 'المهندس ساجد', phone: '01000000000', role: 'IT Manager', username: 'sago', password: 'sagod'}
      ],
      students: [
        {id: 'St501', name: 'أحمد محمود علي', phone: '01012345678', parentPhone: '01098765432', teacher: 'أ. خالد عمر', hwHistory: {}, attHistory: {}, examTeacher: 41, examManager: 45, paid: true}
      ],
      monthBlocks: [
        {material: 'مؤسسة آية', month: 'يونيو 2026', date: '2026-06-06', task: 'حل التكليف الأول ومراجعة المحاضرة السابقة'}
      ],
      userRoles: {
        'IT Manager': ['stats', 'prices', 'users', 'students', 'exams', 'blocks', 'payments', 'attendance', 'grades', 'homework'],
        'Owner': ['stats', 'prices', 'users', 'students'],
        'Manager': ['stats', 'exams', 'students'],
        'Admin': ['stats', 'blocks', 'payments', 'students', 'users'],
        'Teacher': ['attendance', 'grades', 'homework', 'students'],
        'Parent': ['child_status']
      }
    };

    let currentUser = null;
    let activeTab = '';

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-center gap-2 p-3.5 rounded-2xl text-xs font-bold shadow-lg transition-all transform translate-y-4 opacity-0 border ${
        type === 'success' 
          ? 'bg-emerald-950/90 text-emerald-400 border-emerald-500/30' 
          : type === 'error' 
          ? 'bg-red-950/90 text-red-400 border-red-500/30' 
          : 'bg-[#232329]/95 text-blue-400 border-blue-500/20'
      }`;
      
      const icon = type === 'success' ? 'ti-circle-check-filled' : type === 'error' ? 'ti-circle-x-filled' : 'ti-info-circle-filled';
      toast.innerHTML = `
        <i class="ti ${icon} text-base shrink-0"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.remove('translate-y-4', 'opacity-0');
      }, 50);

      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function sortStudentsAlphabetically() {
      DB_EMULATOR.students.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
      DB_EMULATOR.students.forEach((s, idx) => {
        s.id = 'St' + (501 + idx);
        DB_EMULATOR.monthBlocks.forEach(b => {
          if (s.attHistory[b.date] === undefined) s.attHistory[b.date] = 1;
          if (s.hwHistory[b.date] === undefined) s.hwHistory[b.date] = { نحو: 8, نصوص: 9, أدب: 8 };
        });
      });
    }

    async function syncDataFromSheet() {
      if (!WEB_APP_URL) {
        sortStudentsAlphabetically();
        hideGlobalLoader();
        return;
      }
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getInitialData`);
        const result = await response.json();
        if (result.status === "success") {
          if (result.data.Users_Central && result.data.Users_Central.length > 0) {
            DB_EMULATOR.users = result.data.Users_Central;
          }
          if (result.data.Students_Base && result.data.Students_Base.length > 0) {
            const parsedStudents = result.data.Students_Base.map(s => {
              return {
                id: s['كود الطالب'] || '',
                name: s['اسم الطالب'] || '',
                phone: String(s['رقم هاتف الطالب'] || ''),
                parentPhone: String(s['رقم هاتف ولي الأمر'] || ''),
                teacher: s['المدرس'] || '',
                hwHistory: JSON.parse(s.hwHistory || '{}'),
                attHistory: JSON.parse(s.attHistory || '{}'),
                examTeacher: Number(s.examTeacher || 0),
                examManager: Number(s.examManager || 0),
                paid: s.paid === "تم الدفع" || s.paid === true
              };
            });
            DB_EMULATOR.students = parsedStudents;
          } else {
            DB_EMULATOR.students = [];
          }
          if (result.data.Monthly_Blocks && result.data.Monthly_Blocks.length > 0) {
            DB_EMULATOR.monthBlocks = result.data.Monthly_Blocks.map(b => ({
              material: b['المادة'],
              month: b['الشهر'],
              date: b['تاريخ الحصة'],
              task: b['المطلوب/التكليف']
            }));
          }
          sortStudentsAlphabetically();
          showToast("تم مزامنة البيانات سحابياً بنجاح!", "success");
        } else {
          showToast("تعذر جلب البيانات، جاري العمل بالوضع المحلي الاحتياطي.", "error");
          sortStudentsAlphabetically();
        }
      } catch (err) {
        console.error("فشلت المزامنة المباشرة:", err);
        showToast("تنبيه: تعمل كنسخة محاكية محلية الآن.", "info");
        sortStudentsAlphabetically();
      } finally {
        hideGlobalLoader();
      }
    }

    function hideGlobalLoader() {
      const loader = document.getElementById('global-loader');
      if (loader) {
        loader.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    async function sendPostToSheet(action, data) {
      if (!WEB_APP_URL) return true;
      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: action, data: data }),
          headers: { "Content-Type": "text/plain" }
        });
        const res = await response.json();
        return res.status === "success";
      } catch (err) {
        console.error("فشل التحديث الفعلي في الشيت:", err);
        showToast("فشلت الكتابة في شيت جوجل سحابياً، حُفِظ محلياً.", "error");
        return false;
      }
    }

    async function handleLogin() {
      const u = document.getElementById('inp-user').value.trim();
      const p = document.getElementById('inp-pass').value.trim();
      const errEl = document.getElementById('login-error');

      const loader = document.getElementById('global-loader');
      if (loader) {
        loader.classList.remove('opacity-0', 'pointer-events-none');
      }
      await syncDataFromSheet();

      // فحص حساب ولي أمر مخصص مولد من البيانات (Parent)
      let matchingStudent = DB_EMULATOR.students.find(s => {
        const userCode = s.name.split(' ')[0] + '_' + s.phone.slice(-4);
        const passCode = (s.name.split(' ')[0].slice(-3) || s.name.split(' ')[0]) + '_' + s.phone.slice(4, 7);
        return u === userCode && p === passCode;
      });

      if (matchingStudent) {
        currentUser = { name: "ولي أمر: " + matchingStudent.name, role: 'Parent', student: matchingStudent };
        errEl.classList.add('hidden');
        showMainScreen();
        showToast("أهلاً بك يا ولي الأمر المحترم!", "success");
        return;
      }

      // فحص كادر السنتر والمشرف الفني بقواعد المسميات الجديدة
      const foundUser = DB_EMULATOR.users.find(usr => usr.username === u && usr.password === p);
      if (foundUser) {
        currentUser = foundUser;
        errEl.classList.add('hidden');
        showMainScreen();
        showToast(`أهلاً بك يا ${currentUser.name} (${currentUser.role})`, "success");
      } else {
        errEl.classList.remove('hidden');
        hideGlobalLoader();
      }
    }

    function confirmLogout() {
      showCustomModal({
        title: "تسجيل الخروج",
        message: "هل تريد تسجيل الخروج والعودة لشاشة الدخول؟",
        confirmText: "خروج",
        confirmColor: "bg-red-500 hover:bg-red-600",
        onConfirm: () => {
          handleLogout();
        }
      });
    }

    function handleLogout() {
      currentUser = null;
      document.getElementById('screen-main').classList.add('hidden');
      document.getElementById('screen-login').classList.remove('hidden');
      document.getElementById('inp-user').value = '';
      document.getElementById('inp-pass').value = '';
    }

    function showMainScreen() {
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-main').classList.remove('hidden');
      
      document.getElementById('user-display-name').textContent = currentUser.name;
      document.getElementById('user-display-role').textContent = currentUser.role;
      document.getElementById('user-avatar').textContent = currentUser.name[0];

      const tabs = DB_EMULATOR.userRoles[currentUser.role] || ['stats'];
      const navEl = document.getElementById('bottom-navbar');
      navEl.innerHTML = '';

      const tabConfigs = {
        stats: { label: 'الإحصائيات', icon: 'ti-chart-bar' },
        prices: { label: 'الأسعار', icon: 'ti-tag' },
        users: { label: 'المستخدمين', icon: 'ti-users' },
        students: { label: 'الطلاب', icon: 'ti-school' },
        exams: { label: 'درجة المدير', icon: 'ti-pencil' },
        blocks: { label: 'توليد الشهر', icon: 'ti-calendar-event' },
        payments: { label: 'الاشتراكات', icon: 'ti-cash' },
        attendance: { label: 'الغياب', icon: 'ti-calendar-check' },
        grades: { label: 'الدرجات', icon: 'ti-edit' },
        homework: { label: 'المطلوب', icon: 'ti-clipboard-list' },
        child_status: { label: 'مستوى ابني', icon: 'ti-user' }
      };

      if (currentUser.role === 'IT Manager' || currentUser.role === 'Admin') {
        navEl.className = "bg-[#1b1b1f] border-t border-gray-800/60 flex gap-4 px-4 py-2 sticky bottom-0 z-50 overflow-x-auto justify-start custom-scroll";
      } else {
        navEl.className = "bg-[#1b1b1f] border-t border-gray-800/60 flex justify-around py-2 sticky bottom-0 z-50";
      }

      tabs.forEach((tab, index) => {
        const config = tabConfigs[tab];
        if (!config) return;
        const btn = document.createElement('button');
        btn.className = `nav-btn shrink-0 flex flex-col items-center justify-center py-1.5 px-3 text-xs ${index === 0 ? 'text-emerald-500 font-bold' : 'text-gray-500 hover:text-white'} transition-all`;
        btn.id = `btn-tab-${tab}`;
        btn.onclick = () => switchTab(tab);
        btn.innerHTML = `
          <i class="ti ${config.icon} text-lg mb-0.5"></i>
          <span class="text-[10px]">${config.label}</span>
        `;
        navEl.appendChild(btn);
      });

      switchTab(tabs[0]);
    }

    function switchTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('text-emerald-500', 'font-bold');
        b.classList.add('text-gray-500');
      });
      const activeBtn = document.getElementById(`btn-tab-${tabId}`);
      if (activeBtn) {
        activeBtn.classList.add('text-emerald-500', 'font-bold');
        activeBtn.classList.remove('text-gray-500');
      }

      renderContent();
    }

    function renderContent() {
      const container = document.getElementById('main-content');
      container.innerHTML = '';
      container.className = "flex-1 p-4 flex flex-col gap-4 overflow-y-auto max-h-[calc(100vh-140px)] custom-scroll fade-enter fade-enter-active";

      if (activeTab === 'stats') {
        const totalStu = DB_EMULATOR.students.length;
        const paidStu = DB_EMULATOR.students.filter(s => s.paid).length;
        const totalRev = paidStu * DB_EMULATOR.settings.price;
        const activeBlock = DB_EMULATOR.monthBlocks.length;
        
        container.innerHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
              <div class="text-[10px] text-gray-400 mb-1">إجمالي الطلاب المسجلين</div>
              <div class="text-xl font-bold text-white">${totalStu}</div>
              <div class="text-[9px] text-gray-500 mt-1">مؤسسة آية التعليمية</div>
            </div>
            <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
              <div class="text-[10px] text-gray-400 mb-1">الإيرادات المحصلة</div>
              <div class="text-xl font-bold text-emerald-400">${totalRev.toLocaleString()} ج.م</div>
              <div class="text-[9px] text-gray-500 mt-1">من أصل ${(totalStu * DB_EMULATOR.settings.price).toLocaleString()} ج.م</div>
            </div>
            <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
              <div class="text-[10px] text-gray-400 mb-1">حالة الحضور العام</div>
              <div class="text-xl font-bold text-blue-400">84%</div>
              <div class="text-[9px] text-gray-500 mt-1">متوسط الشهر الحالي</div>
            </div>
            <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
              <div class="text-[10px] text-gray-400 mb-1">أيام الحصص المتبقية</div>
              <div class="text-xl font-bold text-amber-500">${activeBlock} حصص</div>
              <div class="text-[9px] text-gray-500 mt-1">مؤسسة آية</div>
            </div>
          </div>

          <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
            <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
              <i class="ti ti-chart-bar text-emerald-500"></i>
              <span>مستوى الطلاب في الواجبات (مرتبين أبجدياً)</span>
            </h3>
            <div class="flex flex-col gap-3">
              ${DB_EMULATOR.students.map(s => {
                let sum = 0, count = 0;
                Object.values(s.hwHistory).forEach(h => {
                  sum += ((Number(h.نحو) || 0) + (Number(h.نصوص) || 0) + (Number(h.أدب) || 0));
                  count += 30;
                });
                const pct = count ? Math.round((sum / count) * 100) : 80;
                return `
                  <div class="flex items-center justify-between text-xs">
                    <span class="w-28 text-gray-300 truncate font-medium">${s.name} <span class="text-[9px] text-gray-500">${s.id}</span></span>
                    <div class="flex-1 bg-[#232329] h-2 rounded-full mx-3 overflow-hidden">
                      <div class="bg-emerald-500 h-full" style="width: ${pct}%"></div>
                    </div>
                    <span class="text-gray-400 font-bold w-8 text-left">${pct}%</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      else if (activeTab === 'prices') {

    function renderStudentView(student) {
      const totalSessions = Object.keys(student.attHistory).length;
      const presentCount = Object.values(student.attHistory).filter(v => v === 1).length;
      const attPct = totalSessions ? Math.round((presentCount / totalSessions) * 100) : 100;

      let totalHwObtained = 0;
      let totalHwMax = 0;
      Object.values(student.hwHistory).forEach(h => {
        totalHwObtained += ((Number(h.نحو) || 0) + (Number(h.نصوص) || 0) + (Number(h.أدب) || 0));
        totalHwMax += 30;
      });
      const hwPct = totalHwMax ? Math.round((totalHwObtained / totalHwMax) * 100) : 80;

      return `
        <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 flex items-center gap-4 shadow-lg">
          <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 text-emerald-500 flex items-center justify-center font-bold text-lg border border-emerald-500/20">
            ${student.name[0]}
          </div>
          <div>
            <h2 class="text-base font-bold text-white">${student.name}</h2>
            <div class="text-[10px] text-emerald-400 font-bold mt-1 bg-emerald-500/10 px-2 py-0.5 rounded-md inline-block">كود الطالب: ${student.id}</div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 text-center shadow-lg">
            <div class="text-[10px] text-gray-400 mb-1">معدل الحضور والالتزام</div>
            <div class="text-xl font-bold text-white">${attPct}%</div>
            <div class="text-[9px] text-gray-500 mt-1">حضر ${presentCount} من أصل ${totalSessions} حصة</div>
          </div>
          <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 text-center shadow-lg">
            <div class="text-[10px] text-gray-400 mb-1">الموقف المالي للاشتراك</div>
            <div class="text-xs font-bold py-1 px-3.5 rounded-xl inline-block mt-1 ${student.paid ? 'bg-emerald-950/40 text-emerald-400 border border-emerald-500/15' : 'bg-amber-950/40 text-amber-500 border border-amber-500/15'}">
              ${student.paid ? 'تم السداد' : 'معلق لم يسدد'}
            </div>
            <div class="text-[9px] text-gray-500 mt-2">قيمة الاشتراك: ${DB_EMULATOR.settings.price} ج.م</div>
          </div>
        </div>

        <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-2xl p-4 shadow-lg">
          <h3 class="text-xs font-bold text-white mb-4 flex items-center gap-2 border-b border-gray-800 pb-2">
            <i class="ti ti-chart-donut text-emerald-500 text-base"></i>
            <span>مستويات التحصيل الأكاديمي الحالية للابن</span>
          </h3>
          <div class="flex flex-col gap-4">
            <div>
              <div class="flex justify-between text-xs mb-1 text-gray-300">
                <span>متوسط درجات الواجب اليومي</span>
                <span class="font-bold text-emerald-400">${hwPct}%</span>
              </div>
              <div class="bg-[#232329] h-2 rounded-full overflow-hidden">
                <div class="bg-emerald-500 h-full" style="width: ${hwPct}%"></div>
              </div>
            </div>

            <div>
              <div class="flex justify-between text-xs mb-1 text-gray-300">

        </div>

    async function updatePrice() {
      const v = parseInt(document.getElementById('inp-new-price').value);
      if (v > 0) {
        DB_EMULATOR.settings.price = v;
        showToast("جاري حفظ سعر الاشتراك في شيت جوجل...", "info");
        await sendPostToSheet("updatePrice", { price: v });
        showToast("تم تحديث وحفظ السعر بنجاح!", "success");
        switchTab('prices');
      } else {
        showToast("يرجى إدخال قيمة صحيحة لمبلغ الاشتراك.", "error");
      }
    }

    function confirmDeleteUser(username) {
      showCustomModal({
        title: "حذف حساب كادر",
        message: `هل أنت متأكد من حذف الحساب "${username}" نهائياً من المؤسسة؟`,
        confirmText: "حذف نهائي",
        confirmColor: "bg-red-500 hover:bg-red-600",
        onConfirm: async () => {
          showToast("جاري حذف الحساب سحابياً...", "info");
          const success = await sendPostToSheet("deleteUser", { username: username });
          if (success) {
            DB_EMULATOR.users = DB_EMULATOR.users.filter(u => u.username !== username);
            showToast("تم حذف الحساب بنجاح وتحديث الشيت.", "success");
            renderContent();
          } else {
            showToast("فشل الحذف الفعلي، جاري إزالته محلياً فقط مؤقتاً.", "info");
            DB_EMULATOR.users = DB_EMULATOR.users.filter(u => u.username !== username);
            renderContent();
          }
        }
      });
    }

    function confirmDeleteStudent(studentName) {
      showCustomModal({
        title: "حذف طالب من المؤسسة",
        message: `هل تريد إزالة الطالب "${studentName}" بالكامل؟ سيقوم الشيت بإعادة ترتيب بقية الطلاب أبجدياً تلقائياً.`,
        confirmText: "تأكيد الحذف",
        confirmColor: "bg-red-500 hover:bg-red-600",
        onConfirm: async () => {
          showToast("جاري الحذف السحابي...", "info");
          const success = await sendPostToSheet("deleteStudent", { name: studentName });
          if (success) {
            showToast("تم الحذف بنجاح! جاري جلب القائمة المرتبة مجدداً...", "success");
            await syncDataFromSheet();
            renderContent();
          } else {
            DB_EMULATOR.students = DB_EMULATOR.students.filter(s => s.name !== studentName);
            sortStudentsAlphabetically();
            renderContent();
            showToast("تم الحذف محلياً فقط.", "info");
          }
        }
      });
    }

    async function updateDailyQuiz(stuId, date, key, val) {
      const s = DB_EMULATOR.students.find(x => x.id === stuId);
      if (s) {
        if (!s.hwHistory[date]) s.hwHistory[date] = { نحو: 0, نصوص: 0, أدب: 0 };
        s.hwHistory[date][key] = parseInt(val) || 0;
        await sendPostToSheet("updateAttendance", { studentId: stuId, date: date, status: "حاضر", [key]: val });
      }
    }

    async function updateManagerExam(stuId, val) {
      const s = DB_EMULATOR.students.find(x => x.id === stuId);
      if (s) {
        s.examManager = parseInt(val) || 0;
        await sendPostToSheet("updateGrades", { studentId: stuId, month: "يونيو 2026", examManager: val });
      }
    }

    async function togglePaymentStatus(stuId, checkVal) {
      const s = DB_EMULATOR.students.find(x => x.id === stuId);
      if (s) {
        s.paid = checkVal;
        await sendPostToSheet("updatePayment", { studentId: stuId, month: "يونيو 2026", required: DB_EMULATOR.settings.price, status: checkVal ? "تم الدفع" : "معلق" });
        showToast(`تم تحديث موقف دفع الاشتراك للطالب ${s.name}`, "success");
        renderContent();
      }
    }

    async function toggleDayAttendanceHistory(stuId, date) {
      const s = DB_EMULATOR.students.find(x => x.id === stuId);
      if (s) {
        s.attHistory[date] = s.attHistory[date] === 1 ? 0 : 1;
        await sendPostToSheet("updateAttendance", { studentId: stuId, date: date, status: s.attHistory[date] === 1 ? "حاضر" : "غائب" });
        renderContent();
      }
    }

    async function addNewHomeworkTask() {
      const tDate = document.getElementById('sel-hw-date').value;
      const tText = document.getElementById('inp-new-hw').value.trim();
      if (tText) {
        const targetBlock = DB_EMULATOR.monthBlocks.find(b => b.date === tDate);
        if (targetBlock) {
          targetBlock.task = tText;
          showToast("جاري حفظ التكليف في قاعدة البيانات...", "info");
          await sendPostToSheet("updateHomework", { date: tDate, material: "مؤسسة آية", task: tText });
          showToast("تم تحديث الواجب بنجاح ونشره بصفحة ولي الأمر!", "success");
          document.getElementById('inp-new-hw').value = '';
          renderContent();
        }
      } else {
        showToast("يرجى كتابة نص التكليف أولاً.", "error");
      }
    }

    async function generateCustomMonth() {
      const month = document.getElementById('sel-block-month').value;
      const dates = [];
      const d = new Date();
      for (let i = 0; i < 28; i++) {
        const temp = new Date(d.getFullYear(), d.getMonth(), d.getDate() + i);
        if (temp.getDay() === 1 || temp.getDay() === 3 || temp.getDay() === 6) {
          dates.push(temp.toISOString().split('T')[0]);
          if (dates.length >= 8) break;
        }
      }
      showToast("جاري توليد حصص الشهر الجديد سحابياً...", "info");
      await sendPostToSheet("generateMonth", { material: "مؤسسة آية", month: month, dates: dates });
      showToast(`تم توليد 8 حصص لشهر ${month}!`, "success");
      await syncDataFromSheet();
    }

    function viewStudentProfile(stuId) {
      const s = DB_EMULATOR.students.find(x => x.id === stuId);
      if (s) {
        const container = document.getElementById('main-content');
        container.innerHTML = `
          <button onclick="switchTab('students')" class="bg-[#232329] text-gray-300 px-3.5 py-2.5 rounded-xl text-xs hover:text-white mb-2 inline-flex items-center gap-1 self-start border border-gray-800/60 active:scale-95 transition-all">
            <i class="ti ti-arrow-right"></i>
            <span>رجوع لكشف الطلاب</span>
          </button>
          ${renderStudentView(s)}
        `;
      }
    }

    function showCustomModal({ title, message, confirmText, confirmColor, onConfirm }) {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-2xl transform scale-95 transition-all">
          <div class="flex items-center gap-2 text-white border-b border-gray-800 pb-3">
            <i class="ti ti-alert-triangle-filled text-amber-500 text-lg"></i>
            <h3 class="text-sm font-bold">${title}</h3>
          </div>
          <p class="text-xs text-gray-300 leading-relaxed">${message}</p>
          <div class="flex gap-2.5 mt-2">
            <button id="modal-confirm-btn" class="flex-1 ${confirmColor} text-white py-3 rounded-2xl text-xs font-bold active:scale-95 transition-all shadow-lg">${confirmText}</button>
            <button onclick="closeCustomModal()" class="flex-1 bg-[#232329] hover:bg-[#2b2b33] text-gray-300 py-3 rounded-2xl text-xs font-bold active:scale-95 border border-gray-800/60 transition-all">إلغاء</button>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
      container.classList.add('flex');
      
      document.getElementById('modal-confirm-btn').onclick = () => {
        onConfirm();
        closeCustomModal();
      };
    }

    function closeCustomModal() {
      const container = document.getElementById('modal-container');
      container.classList.add('hidden');
      container.classList.remove('flex');
      container.innerHTML = '';
    }

    function showAddUserModal() {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-2xl">
          <h3 class="text-sm font-bold text-white mb-2 flex items-center gap-1.5">
            <i class="ti ti-user-plus text-emerald-500"></i>
            <span>إضافة مستخدم جديد</span>
          </h3>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">الاسم الكامل</label>
            <input type="text" id="m-uname" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">رقم الموبايل</label>
            <input type="text" id="m-uphone" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">الوظيفة / الصلاحية</label>
            <select id="m-urole" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
              <option value="Admin">Admin (سكرتارية)</option>
              <option value="Teacher">Teacher (مدرس)</option>
              <option value="Manager">Manager (مدير)</option>
              <option value="Owner">Owner (صاحب السنتر)</option>
            </select>
          </div>
          <div class="flex gap-2.5 mt-2">
            <button onclick="saveNewUser()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-2xl text-xs font-bold active:scale-95 transition-all shadow-lg shadow-emerald-500/10">إضافة وحفظ</button>
            <button onclick="closeCustomModal()" class="flex-1 bg-[#232329] text-gray-300 py-3 rounded-2xl text-xs font-bold border border-gray-800/60">إلغاء</button>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
      container.classList.add('flex');
    }

    async function saveNewUser() {
      const n = document.getElementById('m-uname').value.trim();
      const p = document.getElementById('m-uphone').value.trim();
      const r = document.getElementById('m-urole').value;

      if (n && p) {
        const userCode = n.split(' ')[0] + '_' + p.slice(-4);
        const passCode = (n.split(' ')[0].slice(-3) || n.split(' ')[0]) + '_' + p.slice(4, 7);

        const newUser = { name: n, phone: p, role: r, username: userCode, password: passCode };
        DB_EMULATOR.users.push(newUser);
        
        showToast("جاري حفظ حساب الموظف الجديد سحابياً...", "info");
        await sendPostToSheet("addUser", newUser);
        showToast("تم إنشاء وتأكيد الحساب بنجاح!", "success");
        closeCustomModal();
        switchTab('users');
      } else {
        showToast("يرجى ملء كافة الخانات المطلوبة.", "error");
      }
    }

    function showAddStudentModal() {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="bg-[#1b1b1f] border border-gray-800/80 rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-2xl">
          <h3 class="text-sm font-bold text-white mb-2 flex items-center gap-1.5">
            <i class="ti ti-school text-emerald-500"></i>
            <span>تسجيل طالب جديد بالمؤسسة</span>
          </h3>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">اسم الطالب الكامل</label>
            <input type="text" id="m-sname" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">رقم هاتف الطالب</label>
            <input type="text" id="m-sphone" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">رقم هاتف ولي الأمر (للمتابعة)</label>
            <input type="text" id="m-spphone" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2">المدرس المندوب</label>
            <select id="m-steacher" class="w-full bg-[#232329] border border-gray-800 rounded-2xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
              <option value="أ. خالد عمر">أ. خالد عمر</option>
              <option value="أ. منى سامي">أ. منى سامي</option>
            </select>
          </div>
          <div class="flex gap-2.5 mt-2">
            <button onclick="saveNewStudent()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-2xl text-xs font-bold active:scale-95 transition-all shadow-lg shadow-emerald-500/10">تسجيل وحفظ</button>
            <button onclick="closeCustomModal()" class="flex-1 bg-[#232329] text-gray-300 py-3 rounded-2xl text-xs font-bold border border-gray-800/60">إلغاء</button>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
      container.classList.add('flex');
    }

    async function saveNewStudent() {
      const n = document.getElementById('m-sname').value.trim();
      const p = document.getElementById('m-sphone').value.trim();
      const pp = document.getElementById('m-spphone').value.trim();
      const t = document.getElementById('m-steacher').value;

      if (n && p) {
        const tempStudent = { name: n, phone: p, parentPhone: pp, teacher: t };

        showToast("جاري تسجيل الطالب سحابياً...", "info");
        await sendPostToSheet("addStudent", tempStudent);
        showToast("تم إدخال الطالب بنجاح! جاري تحديث القائمة والترتيب الأبجدي...", "success");
        closeCustomModal();
        await syncDataFromSheet();
        switchTab('students');
      } else {
        showToast("يرجى ملء كافة الخانات المطلوبة.", "error");
      }
    }

    window.onload = function() {
      syncDataFromSheet();
    };
  </script>
</body>
