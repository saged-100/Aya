<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة آية التعليمية - نظام الإدارة السحابي المطور</title>
    <!-- مكتبة الأيقونات والخطوط -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        brandAccent: '#8b5cf6',
                        brandHover: '#7c3aed'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- نظام التنبيهات المنبثقة Toasts -->
    <div id="toast-container" class="fixed top-5 left-5 z-[100] flex flex-col gap-3"></div>

    <!-- شاشة تسجيل الدخول الأنيقة والخالية من التوجيهات -->
    <div id="login-screen" class="flex-grow flex items-center justify-center px-4">
        <div class="bg-cardBg p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700/50">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-brandAccent/10 text-brandAccent rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ti ti-school text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-1">مؤسسة آية</h1>
                <p class="text-slate-400 text-sm">نظام الإدارة الشامل والرقابة الأكاديمية الصارمة</p>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">اسم المستخدم</label>
                    <input type="text" id="username" required class="w-full bg-darkBg border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brandAccent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">كلمة المرور</label>
                    <input type="password" id="password" required class="w-full bg-darkBg border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brandAccent transition">
                </div>
                <button type="submit" class="w-full bg-brandAccent hover:bg-brandHover text-white py-3 rounded-xl font-semibold transition shadow-lg shadow-brandAccent/20">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <!-- لوحة التحكم الرئيسية للنظام السحابي المباشر -->
    <div id="main-dashboard" class="hidden flex-grow flex flex-col">
        <!-- شريط الرأس المتطور -->
        <header class="bg-cardBg border-b border-slate-700 px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-brandAccent/20 text-brandAccent p-2 rounded-xl font-bold flex items-center justify-center w-10 h-10">
                    <i class="ti ti-award text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white">مؤسسة آية التعليمية</h2>
                    <p class="text-xs text-slate-400">مرحباً بك: <span id="user-display-name" class="text-brandAccent font-bold"></span> (<span id="user-role-name" class="text-emerald-400 font-semibold"></span>)</p>
                </div>
            </div>
            <button onclick="logout()" class="bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white px-4 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2">
                <i class="ti ti-logout text-base"></i>
                <span>تسجيل الخروج</span>
            </button>
        </header>

        <!-- محتوى التطبيق وقائمة التنقل -->
        <div class="flex-grow flex flex-col md:flex-row">
            <!-- القائمة الجانبية -->
            <aside class="w-full md:w-64 bg-cardBg border-l border-slate-700/60 p-4 space-y-1" id="sidebar-menu">
                <!-- يتم توليدها ديناميكياً لتأمين الوصول للتبويبات -->
            </aside>

            <!-- منطقة العرض الرئيسية -->
            <main class="flex-grow p-6 custom-scroll overflow-y-auto max-h-[calc(100vh-80px)]">
                <div id="tab-content" class="space-y-6">
                    <!-- المحتوى النشط هنا -->
                </div>
            </main>
        </div>
    </div>

    <script>
        // الرابط الجديد الفعال الخاص بك لـ Google Sheets Web App
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypeB4YcdcEfh5e-3dmJkYvvSxZjdNH-adYujVzo3kgiOg1ix0ZmrD4iHF0ibWlPv72/exec";
        
        let sessionUser = null;
        let globalData = { Users: [], Students: [], Subjects: [], Sessions: [], ExamSchedules: [], AttendanceAndHomework: [], MonthlyExams: [] };

        function showToast(msg, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `px-5 py-3 rounded-xl shadow-xl text-white text-sm font-medium transition-all duration-300 transform translate-x-0 flex items-center gap-2 ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`;
            toast.innerHTML = `<i class="ti ${type === 'success' ? 'ti-circle-check' : 'ti-alert-circle'} text-lg"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            
            showToast("جاري التحقق من الصلاحيات السحابية...", "success");
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username: u, password: p })
                });
                const result = await response.json();
                if(result.success) {
                    sessionUser = result.data;
                    document.getElementById("login-screen").classList.add("hidden");
                    document.getElementById("main-dashboard").classList.remove("hidden");
                    document.getElementById("user-display-name").innerText = sessionUser.username;
                    document.getElementById("user-role-name").innerText = sessionUser.role;
                    showToast("تم تسجيل الدخول بنجاح كـ " + sessionUser.role, "success");
                    await refreshData();
                    buildSidebar();
                    loadDefaultTab();
                } else {
                    showToast(result.msg, "error");
                }
            } catch(err) {
                showToast("فشل الاتصال بـ Google Web App المباشر", "error");
            }
        }

        async function refreshData() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=fetchAll`);
                const json = await res.json();
                if(json.success) {
                    globalData = json.data;
                }
            } catch(e) {
                showToast("خطأ أثناء الاتصال السحابي بتحديثات الشيت", "error");
            }
        }

        function logout() {
            sessionUser = null;
            document.getElementById("main-dashboard").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("login-form").reset();
        }

        // هندسة التنقل والصلاحيات الكاملة لمؤسسة آية
        function buildSidebar() {
            const menu = document.getElementById("sidebar-menu");
            menu.innerHTML = "";
            const role = sessionUser.role;

            const tabs = [
                { id: "overview", name: "لوحة المتابعة الإجمالية", icon: "ti-dashboard", roles: ["Owner", "IT Manager", "Admin", "Manager"] },
                { id: "users", name: "إدارة الحسابات والموظفين", icon: "ti-users", roles: ["IT Manager", "Admin"] },
                { id: "students", name: "كشوف الطلاب والماليات", icon: "ti-school", roles: ["Owner", "IT Manager", "Admin", "Manager", "Teacher"] },
                { id: "subjects", name: "إدارة المواد والدرجات الكبرى", icon: "ti-book", roles: ["Owner", "IT Manager", "Admin"] },
                { id: "sessions", name: "أيام الحضور والجدول", icon: "ti-calendar-event", roles: ["Owner", "IT Manager", "Admin", "Teacher"] },
                { id: "exams", name: "الامتحانات وشؤون التقييم", icon: "ti-report-analytics", roles: ["Owner", "IT Manager", "Admin", "Manager", "Teacher"] },
                { id: "parent-portal", name: "بوابة ولي الأمر الاستعلامية", icon: "ti-user-circle", roles: ["Parent", "IT Manager", "Owner"] }
            ];

            tabs.forEach(tab => {
                if(tab.roles.includes(role)) {
                    const btn = document.createElement("button");
                    btn.className = "w-full text-right px-4 py-3 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-700/50 hover:text-white transition flex items-center gap-3 mb-1";
                    btn.innerHTML = `<i class="ti ${tab.icon} text-lg"></i><span>${tab.name}</span>`;
                    btn.onclick = () => switchTab(tab.id);
                    menu.appendChild(btn);
                }
            });
        }

        function loadDefaultTab() {
            if(sessionUser.role === "Parent") {
                switchTab("parent-portal");
            } else {
                switchTab("overview");
            }
        }

        async function switchTab(tabId) {
            const content = document.getElementById("tab-content");
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center py-24 text-slate-400 space-y-4">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brandAccent"></div>
                    <p class="text-sm">جاري مزامنة وتجهيز البيانات طبقاً لمستوى صلاحيتك الفعلي...</p>
                </div>`;
            
            await refreshData();
            const isReadOnly = (sessionUser.role === "Owner");

            if(tabId === "overview") {
                const totalStu = globalData.Students.length;
                const paidCount = globalData.Students.filter(s => s.FinancialStatus === "مدفوع الاشتراك").length;
                const unpaidCount = totalStu - paidCount;

                content.innerHTML = `
                    <h3 class="text-2xl font-bold mb-4 text-white">تحليل أداء مؤسسة آية الإجمالي</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-slate-400 text-sm">إجمالي الطلاب المسجلين</span>
                                <i class="ti ti-users text-xl text-brandAccent"></i>
                            </div>
                            <p class="text-3xl font-bold text-white mt-1">${totalStu} طالب</p>
                        </div>
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-slate-400 text-sm">الحسابات السحابية النشطة</span>
                                <i class="ti ti-key text-xl text-emerald-400"></i>
                            </div>
                            <p class="text-3xl font-bold text-white mt-1">${globalData.Users.length} مستخدم</p>
                        </div>
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-slate-400 text-sm">عدد المواد والبرامج</span>
                                <i class="ti ti-archive text-xl text-amber-400"></i>
                            </div>
                            <p class="text-3xl font-bold text-white mt-1">${globalData.Subjects.length} تخصصات</p>
                        </div>
                    </div>

                    <div class="bg-cardBg p-6 rounded-2xl border border-slate-700">
                        <h4 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                            <i class="ti ti-chart-pie text-brandAccent"></i>
                            <span>كشف التحصيل والموقف المالي للمؤسسة</span>
                        </h4>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>الطلاب المسددين للاشتراك</span>
                                    <span>${paidCount} من ${totalStu}</span>
                                </div>
                                <div class="bg-darkBg h-3 rounded-full overflow-hidden">
                                    <div class="bg-emerald-500 h-full" style="width: ${totalStu ? (paidCount/totalStu)*100 : 0}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>المبالغ المعلقة والاشتراكات المتأخرة</span>
                                    <span>${unpaidCount} من ${totalStu}</span>
                                </div>
                                <div class="bg-darkBg h-3 rounded-full overflow-hidden">
                                    <div class="bg-rose-500 h-full" style="width: ${totalStu ? (unpaidCount/totalStu)*100 : 0}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if(tabId === "users") {
                let formHTML = "";
                if(!isReadOnly) {
                    formHTML = `
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700 mb-6">
                            <h4 class="text-lg font-bold mb-4 text-brandAccent flex items-center gap-2">
                                <i class="ti ti-plus"></i>
                                <span>إضافة حساب موظف جديد للمؤسسة</span>
                            </h4>
                            <form onsubmit="handleUserAction(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" id="new-uname" placeholder="اسم المستخدم" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="password" id="new-upass" placeholder="كلمة المرور" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <select id="new-urole" class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                    <option value="Admin">Admin (السكرتيرة)</option>
                                    <option value="Manager">Manager (المدير)</option>
                                    <option value="Teacher">Teacher (المعلم)</option>
                                    <option value="Parent">Parent (ولي الأمر)</option>
                                    ${sessionUser.role === 'IT Manager' ? '<option value="Owner">Owner</option><option value="IT Manager">IT Manager</option>' : ''}
                                </select>
                                <input type="text" id="new-usub" placeholder="المادة (للمعلم فقط)" class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white col-span-1">
                                <button type="submit" class="bg-brandAccent hover:bg-brandHover py-2 rounded-xl text-white font-bold transition col-span-4 flex items-center justify-center gap-2">
                                    <i class="ti ti-device-floppy"></i>
                                    <span>حفظ وتفعيل الحساب</span>
                                </button>
                            </form>
                        </div>
                    `;
                }
                
                let tableRows = globalData.Users.map(u => {
                    let deleteBtn = "";
                    if(!isReadOnly && u.Role !== 'Owner' && u.Role !== 'IT Manager') {
                        deleteBtn = `<button onclick="confirmDeleteUser('${u.Username}')" class="text-rose-400 hover:text-rose-600 font-bold flex items-center gap-1 justify-center mx-auto"><i class="ti ti-trash"></i><span>حذف</span></button>`;
                    }
                    return `
                        <tr class="border-b border-slate-700/50">
                            <td class="p-3 text-slate-200 font-semibold">${u.Username}</td>
                            <td class="p-3 text-emerald-400 font-bold">${u.Role}</td>
                            <td class="p-3 text-slate-400">${u.Subject || '-'}</td>
                            <td class="p-3 text-center">${deleteBtn || '-'}</td>
                        </tr>
                    `;
                }).join("");

                content.innerHTML = `
                    <h3 class="text-2xl font-bold mb-4 text-white">إدارة حسابات وصلاحيات موظفي مؤسسة آية</h3>
                    ${formHTML}
                    <div class="bg-cardBg rounded-2xl border border-slate-700 overflow-hidden">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-slate-800 text-slate-300 border-b border-slate-700">
                                    <th class="p-3">اسم المستخدم</th>
                                    <th class="p-3">الصلاحية السحابية</th>
                                    <th class="p-3">المادة / التخصص</th>
                                    <th class="p-3 text-center">التحكم</th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                `;
            }

            if(tabId === "students") {
                let formHTML = "";
                if(sessionUser.role === "Admin" || sessionUser.role === "IT Manager") {
                    formHTML = `
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700 mb-6">
                            <h4 class="text-lg font-bold mb-4 text-brandAccent flex items-center gap-2">
                                <i class="ti ti-user-plus"></i>
                                <span>تسجيل طالب جديد بالمنظومة</span>
                            </h4>
                            <form onsubmit="handleStudentAction(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" id="s-name" placeholder="اسم الطالب بالكامل" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="text" id="s-phone" placeholder="رقم هاتف الطالب" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="text" id="s-pphone" placeholder="رقم هاتف ولي الأمر" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="text" id="s-group" placeholder="المجموعة الدراسية (المعلمة)" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <select id="s-fin" class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white col-span-2">
                                    <option value="مدفوع الاشتراك">مدفوع الاشتراك</option>
                                    <option value="غير مدفوع">غير مدفوع</option>
                                </select>
                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 py-2 rounded-xl text-white font-bold transition col-span-2 flex items-center justify-center gap-2">
                                    <i class="ti ti-circle-plus"></i>
                                    <span>حفظ بيانات الطالب</span>
                                </button>
                            </form>
                        </div>
                    `;
                }

                // فلترة الطلاب للمعلمة لترى فقط مجموعتها
                let filteredStudents = globalData.Students;
                if(sessionUser.role === "Teacher") {
                    filteredStudents = globalData.Students.filter(s => s.Group === sessionUser.subject);
                }

                let rows = filteredStudents.map(s => {
                    let actions = "";
                    if(sessionUser.role === "Admin" || sessionUser.role === "IT Manager") {
                        actions = `
                            <button onclick="toggleFinancial('${s.StudentID}', '${s.FinancialStatus === 'مدفوع الاشتراك' ? 'غير مدفوع' : 'مدفوع الاشتراك'}')" class="text-amber-400 hover:underline ml-4 flex items-center gap-1 inline-flex"><i class="ti ti-cash"></i><span>تعديل السداد</span></button>
                            <button onclick="confirmDeleteStudent('${s.StudentID}')" class="text-rose-400 hover:underline flex items-center gap-1 inline-flex"><i class="ti ti-trash"></i><span>حذف</span></button>
                        `;
                    }
                    return `
                        <tr class="border-b border-slate-700/50">
                            <td class="p-3 text-slate-300 font-mono text-xs">${s.StudentID}</td>
                            <td class="p-3 font-bold text-white">${s.Name}</td>
                            <td class="p-3 text-slate-400 text-sm">${s.Phone}</td>
                            <td class="p-3 text-slate-400 text-sm">${s.Group}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded-lg text-xs font-bold ${s.FinancialStatus === 'مدفوع الاشتراك' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-rose-500/20 text-rose-400 border border-rose-500/30'}">${s.FinancialStatus}</span></td>
                            <td class="p-3 text-center">${actions || '-'}</td>
                        </tr>
                    `;
                }).join("");

                content.innerHTML = `
                    <h3 class="text-2xl font-bold mb-4 text-white">كشوف الطلاب والمواقف المالية</h3>
                    ${formHTML}
                    <div class="bg-cardBg rounded-2xl border border-slate-700 overflow-hidden">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-slate-800 text-slate-300 border-b border-slate-700">
                                    <th class="p-3">كود الطالب</th>
                                    <th class="p-3">الاسم الكامل</th>
                                    <th class="p-3">رقم الهاتف</th>
                                    <th class="p-3">مجموعة / معلمة</th>
                                    <th class="p-3">حالة الاشتراك المالي</th>
                                    <th class="p-3 text-center">التحكم</th>
                                </tr>
                            </thead>
                            <tbody>${rows || '<tr><td colspan="6" class="text-center py-6 text-slate-400">لا يوجد طلاب مسجلين حالياً.</td></tr>'}</tbody>
                        </table>
                    </div>
                `;
            }

            if(tabId === "subjects") {
                let formHTML = "";
                if(!isReadOnly && (sessionUser.role === "Admin" || sessionUser.role === "IT Manager")) {
                    formHTML = `
                        <div class="bg-cardBg p-6 rounded-2xl border border-slate-700 mb-6">
                            <h4 class="text-lg font-bold mb-4 text-brandAccent flex items-center gap-2">
                                <i class="ti ti-book-plus"></i>
                                <span>إضافة مادة تعليمية جديدة وتحديد درجاتها الكبرى</span>
                            </h4>
                            <form onsubmit="handleSubjectAction(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" id="sub-name" placeholder="اسم المادة العلمية" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="number" id="sub-maxhw" placeholder="عظمى الواجب اليومي" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="number" id="sub-maxt" placeholder="عظمى اختبار المعلمة" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">
                                <input type="number" id="sub-maxm" placeholder="عظمى اختبار الإدارة" required class="bg-darkBg border border-slate-600 rounded-xl px-4 py-2 text-white">

        async function submitAttendanceData(sessionId) {
            const statuses = document.querySelectorAll(".attendance-status");
            const records = [];
            
            statuses.forEach(el => {
                const sId = el.getAttribute("data-sid");
                const hwEl = document.querySelector(`.homework-grade[data-sid="${sId}"]`);
                const noteEl = document.querySelector(`.teacher-notes[data-sid="${sId}"]`);
                records.push({
                    studentId: sId,
                    status: el.value,
                    hwGrade: hwEl ? hwEl.value : '',
                    notes: noteEl ? noteEl.value : ''
                });
            });

            showToast("جاري إرسال ومزامنة السجلات بالكامل سحابياً...", "success");
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'rصدAttendance', sessionId, records })
            });
            const res = await response.json();
            if(res.success) {
                showToast("تم تحديث ورصد الحضور والواجب اليومي بنجاح");
                document.getElementById("attendance-modal").remove();
                switchTab("sessions");
            }
        }

                    <p class="font-bold text-white flex items-center gap-1"><i class="ti ti-calendar"></i><span>دورة الشهر: ${ex.MonthBlock}</span></p>
                    <p class="text-emerald-400 font-bold">اختبار المعلمة: ${ex.TeacherExamGrade || 'لم يرصد بعد'}</p>
                    <p class="text-brandAccent font-bold">اختبار الإدارة: ${ex.ManagerExamGrade || 'لم يرصد بعد'}</p>
                </div>
            `).join("");

            targetArea.innerHTML = `
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-600/40 space-y-3">
                    <p class="text-sm font-bold text-white flex items-center gap-2">
                        <i class="ti ti-id-badge text-brandAccent text-lg"></i>
                        <span>الطالب: ${student.Name}</span>
                    </p>
                    <p class="text-xs text-slate-300">المجموعة: ${student.Group} | الموقف المالي: <span class="font-bold text-emerald-400">${student.FinancialStatus}</span></p>
                    
                    <div class="border-t border-slate-700 pt-3">
                        <p class="text-xs font-bold text-slate-400 mb-2">سجل التقييم والواجب اليومي:</p>
                        <div class="space-y-1 max-h-36 overflow-y-auto custom-scroll">${attendanceHTML || '<p class="text-slate-500 text-xs">لا توجد سجلات رصدت بعد.</p>'}</div>
                    </div>
                    <div class="border-t border-slate-700 pt-3">
                        <p class="text-xs font-bold text-slate-400 mb-2">نتائج امتحانات الشهر المعتمدة:</p>
                        <div class="space-y-2">${examsHTML || '<p class="text-slate-500 text-xs">لم تسجل اختبارات هذا الشهر حتى الآن.</p>'}</div>
                    </div>
                </div>
            `;
        }

        // مودال مخصص للتأكيد على الإجراءات الهامة والخطرة
        function openConfirmModal(message, confirmCallback) {
            const backdrop = document.createElement("div");
            backdrop.className = "fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50";
            backdrop.id = "confirm-modal";

            backdrop.innerHTML = `
                <div class="bg-cardBg rounded-2xl border border-slate-700 w-full max-w-sm p-6 flex flex-col items-center text-center">
                    <div class="w-12 h-12 rounded-full bg-rose-500/10 text-rose-400 flex items-center justify-center mb-4">
                        <i class="ti ti-trash text-2xl"></i>
                    </div>
                    <h4 class="text-base font-bold text-white mb-2">تحذير أمني هام</h4>
                    <p class="text-xs text-slate-400 mb-6 leading-relaxed">${message}</p>
                    <div class="flex gap-3 w-full">
                        <button onclick="document.getElementById('confirm-modal').remove()" class="flex-1 bg-slate-700 text-slate-200 py-2 rounded-xl text-xs font-medium transition">تراجع</button>
                        <button id="confirm-modal-ok" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white py-2 rounded-xl text-xs font-bold transition">نعم، تأكيد الحذف</button>
                    </div>
                </div>
            `;
            document.body.appendChild(backdrop);
            document.getElementById("confirm-modal-ok").onclick = () => {
                confirmCallback();
                document.getElementById("confirm-modal").remove();
            };
        }
    </script>
</body>
</html>
